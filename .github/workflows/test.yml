name: Test

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  test:
    name: Test & Coverage
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Download dependencies
        run: go mod download

      - name: Run tests with coverage
        run: go test -v -race -coverprofile=coverage.out -covermode=atomic ./...

      - name: Show coverage summary
        if: always()
        continue-on-error: true
        run: go tool cover -func=coverage.out

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.out
          if-no-files-found: warn

  integration:
    name: Integration Tests
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Generate BookStack APP_KEY
        run: echo "APP_KEY=base64:$(openssl rand -base64 32)" >> $GITHUB_ENV

      - name: Start BookStack
        run: docker compose up -d

      - name: Wait for BookStack to be ready
        run: |
          echo "Waiting for BookStack (up to 5 min)..."
          for i in $(seq 1 60); do
            if curl -sf http://localhost:8080/login > /dev/null 2>&1; then
              echo "BookStack is ready after ${i} attempts"
              exit 0
            fi
            echo "  attempt ${i}/60 – not ready yet, sleeping 5 s"
            sleep 5
          done
          echo "ERROR: BookStack did not become ready in time"
          docker compose logs
          exit 1

      - name: Create API token
        run: |
          docker compose exec -T app php -r '
          $pdo = new PDO("mysql:host=db;dbname=bookstack", "bookstack", "booksecret");
          $user = $pdo->query("SELECT id FROM users LIMIT 1")->fetch(PDO::FETCH_ASSOC);
          $hash = password_hash("ci-token-secret", PASSWORD_BCRYPT);
          $stmt = $pdo->prepare("INSERT INTO api_tokens (token_id, secret, user_id, name, expires_at, created_at, updated_at) VALUES (?, ?, ?, ?, ?, NOW(), NOW())");
          $stmt->execute(["ci-token-id", $hash, $user["id"], "ci-test", "2099-12-31"]);
          echo "Token created for user " . $user["id"] . "\n";
          '

      - name: Run integration tests
        # BOOKSTACK_TOKEN_ID / BOOKSTACK_TOKEN_SECRET are ephemeral test
        # credentials created above for a throwaway, localhost-only container
        # that is destroyed at the end of this job.
        env:
          BOOKSTACK_URL: http://localhost:8080
          BOOKSTACK_TOKEN_ID: ci-token-id
          BOOKSTACK_TOKEN_SECRET: ci-token-secret
        run: go run ./tests/integration/

      - name: Dump container logs on failure
        if: failure()
        run: docker compose logs

      - name: Stop containers
        if: always()
        run: docker compose down -v
